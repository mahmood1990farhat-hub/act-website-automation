          function initMap() {
            const center = { lat: 51.47, lng: -0.454 };
            const map = new google.maps.Map(document.getElementById("map"), {
              zoom: 13,
              center: center,
              mapTypeId: "roadmap",
              styles: [
                {
                  featureType: "poi",
                  elementType: "labels",
                  stylers: [{ visibility: "simplified" }],
                },
              ],
            });

            const polygon = new google.maps.Polygon({
              paths: path,
              strokeColor: "#00a8e8",
              strokeOpacity: 1,
              strokeWeight: 2,
              fillColor: "#00a8e8",
              fillOpacity: 0.3,
            });
            polygon.setMap(map);

            const bounds = new google.maps.LatLngBounds();
            path.forEach(function (p) {
              bounds.extend(p);
            });
            map.fitBounds(bounds, 50);
          }
